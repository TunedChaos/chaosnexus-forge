<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChaosNexus Forge Loading</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      color: #f4f4f5;
      overflow: hidden;
    }
    
    .splash-container {
      background-color: rgba(9, 9, 11, 0.95); /* Dark background */
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      animation: fadeIn 0.3s ease-out;
    }

    .logo-box {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
    }

    .brand {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .loading-text {
      font-size: 11px;
      color: #71717a;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.95); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <img class="logo-box" src="/favicon.svg" alt="ChaosNexus Forge Logo" />
    <div class="brand">ChaosNexus Forge</div>
    <div class="loading-text">Initializing Systems...</div>
  </div>
</body>
</html>
