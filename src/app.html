<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChaosNexus Forge</title>
    %sveltekit.head%
    <script>
      (function () {
        try {
          const theme = localStorage.getItem("chaosnexus-forge:theme") || "System";
          let activeTheme = theme;
          if (theme === "System") {
            const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            activeTheme = systemDark ? "dark" : "light";
          } else {
            const mapping = {
              "Standard Dark": "dark",
              "Standard Light": "light",
              "High Contrast Dark": "hc-dark",
              "High Contrast Light": "hc-light",
              "Protanopia Dark": "protanopia-dark",
              "Protanopia Light": "protanopia-light",
              "Deuteranopia Dark": "deuteranopia-dark",
              "Deuteranopia Light": "deuteranopia-light",
              "Tritanopia Dark": "tritanopia-dark",
              "Tritanopia Light": "tritanopia-light",
              "Monochromacy Dark": "monochromacy-dark",
              "Monochromacy Light": "monochromacy-light",
            };
            activeTheme = mapping[theme] || "dark";
          }
          document.documentElement.setAttribute("data-theme", activeTheme);
          const isDark = activeTheme.includes("dark");
          document.documentElement.style.backgroundColor = isDark ? "#09090b" : "#fafafa";
        } catch (e) {}
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
